<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Yuno</title>
    <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/core.css">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/hero.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/buttons.css">
    <link rel="stylesheet" href="../assets/css/form-styles.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="../assets/css/table-styles.css">
    <link rel="stylesheet" href="../assets/css/modal.css">
    <link rel="stylesheet" href="../assets/css/banner.css">
    <link rel="stylesheet" href="../assets/css/totals.css">
    <link rel="stylesheet" href="../assets/css/sections.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="topNav">
        <div id="navBrand" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <img src="../assets/images/logo.svg" alt="Yuno Logo" style="width: 40px; height: 40px; display: flex;" />
            <h1 style="margin: 0; background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; font-size: 1.5rem; letter-spacing: 1px;">YUNO</h1>
        </div>
        <div id="navMenu"></div>
        <button id="themeToggle" title="Toggle Dark Mode" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: 0.5rem; border-radius: 50%; hover-background: rgba(0,0,0,0.1); transition: all 0.3s ease;">
            <span class="theme-icon">🌙</span>
        </button>
    </nav>

    <main>
        <div class="auth-container">
            <div class="auth-box">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="login">Sign In</button>
                    <button class="tab-btn" data-tab="signup">Create Account</button>
                </div>
                
                <!-- LOGIN TAB -->
                <div id="login" class="tab-content active">
                    <h2 style="text-align: center; margin-top: 0;">Welcome Back</h2>
                    <div id="loginError" class="error"></div>
                    <div id="loginSuccess" class="success"></div>
                    
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginEmail">Email Address:</label>
                            <input type="email" id="loginEmail" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password:</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn-auth">Sign In</button>
                    </form>
                    
                    <div class="demo-box">
                        <p><strong>Want to try first?</strong> <a href="../index.html">Explore features</a> without an account</p>
                    </div>
                </div>
                
                <!-- SIGNUP TAB -->
                <div id="signup" class="tab-content">
                    <h2 style="text-align: center; margin-top: 0;">Create Your Account</h2>
                    <div id="signupError" class="error"></div>
                    <div id="signupSuccess" class="success"></div>
                    
                    <form id="signupForm">
                        <div class="form-group">
                            <label for="signupBusinessName">Business Name:</label>
                            <input type="text" id="signupBusinessName" placeholder="Your business name" required>
                        </div>

                        <div class="form-group">
                            <label for="signupEmail">Email Address:</label>
                            <input type="email" id="signupEmail" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="signupPassword">Password:</label>
                            <input type="password" id="signupPassword" placeholder="Create a password (min. 6 characters)" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="signupPasswordConfirm">Confirm Password:</label>
                            <input type="password" id="signupPasswordConfirm" placeholder="Confirm your password" required minlength="6">
                        </div>

                        <button type="submit" class="btn-auth">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/theme-manager.js"></script>
    <script src="../assets/js/components-loader.js"></script>
    <script src="../assets/js/invoice-manager.js"></script>
    <script src="../assets/js/form-handler.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/carousel.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script>
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                // Show selected tab
                document.getElementById(tabName).classList.add('active');
                this.classList.add('active');
            });
        });
        
        // LOGIN FORM HANDLER
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const result = AuthManager.login(email, password);
            
            if (result.success) {
                successDiv.textContent = result.message;
                successDiv.style.display = 'block';
                
                // Redirect after 1 second
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'dashboard.html';
                    window.location.href = redirect;
                }, 1000);
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
            }
        });
        
        // SIGNUP FORM HANDLER
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const businessName = document.getElementById('signupBusinessName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validate passwords match
            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            const result = AuthManager.register(email, password, businessName);
            
            if (result.success) {
                successDiv.textContent = result.message + '. Logging you in...';
                successDiv.style.display = 'block';
                
                // Auto-login after registration
                setTimeout(() => {
                    AuthManager.login(email, password);
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
