<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Yuno</title>
    <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/core.css">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/hero.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/buttons.css">
    <link rel="stylesheet" href="../assets/css/form-styles.css">
    <link rel="stylesheet" href="../assets/css/table-styles.css">
    <link rel="stylesheet" href="../assets/css/modal.css">
    <link rel="stylesheet" href="../assets/css/banner.css">
    <link rel="stylesheet" href="../assets/css/totals.css">
    <link rel="stylesheet" href="../assets/css/sections.css">
    <link rel="stylesheet" href="../assets/css/account.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="topNav">
        <div id="navBrand" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <img src="../assets/images/logo.svg" alt="Yuno Logo" style="width: 40px; height: 40px; display: flex;" />
            <h1 style="margin: 0; background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; font-size: 1.5rem; letter-spacing: 1px;">YUNO</h1>
        </div>
        <div id="navMenu"></div>
        <button id="themeToggle" title="Toggle Dark Mode" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: 0.5rem; border-radius: 50%; hover-background: rgba(0,0,0,0.1); transition: all 0.3s ease;">
            <span class="theme-icon">🌙</span>
        </button>
    </nav>

    <main>
        <div class="account-container">
            <!-- Account Header -->
            <div class="account-header">
                <div class="account-header-info">
                    <div class="account-avatar" id="accountAvatar">Y</div>
                    <div class="account-details">
                        <h2 id="accountBusinessName">Business Name</h2>
                        <p id="accountEmail">email@example.com</p>
                        <p id="accountMemberSince">Member since: -</p>
                    </div>
                </div>
                <div>
                    <button class="logout-btn-header" onclick="handleLogout()">Logout</button>
                </div>
            </div>

            <!-- Account Tabs -->
            <div class="account-tabs">
                <button class="account-tab-btn active" data-tab="profile">Profile</button>
                <button class="account-tab-btn" data-tab="business">Business Info</button>
                <button class="account-tab-btn" data-tab="security">Security</button>
            </div>

            <!-- Profile Tab -->
            <div id="profile" class="account-tab-content active">
                <h3>Personal Information</h3>
                <div id="profileSuccess" class="success-message"></div>
                <div id="profileError" class="error-message"></div>
                
                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="profileEmail">Email Address:</label>
                            <input type="email" id="profileEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="profilePhone">Phone Number:</label>
                            <input type="tel" id="profilePhone">
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-save">Save Changes</button>
                        <button type="button" class="btn-cancel" onclick="resetProfileForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Business Info Tab -->
            <div id="business" class="account-tab-content">
                <h3>Business Information</h3>
                <div id="businessSuccess" class="success-message"></div>
                <div id="businessError" class="error-message"></div>
                
                <form id="businessForm">
                    <div class="form-group">
                        <label for="businessName">Business Name:</label>
                        <input type="text" id="businessName" placeholder="Your Business Name" required>
                    </div>
                    <div class="form-group">
                        <label for="businessABN">ABN:</label>
                        <input type="text" id="businessABN" placeholder="e.g., 12345678901">
                    </div>
                    <div class="form-group">
                        <label for="businessBusinessEmail">Email:</label>
                        <input type="email" id="businessBusinessEmail" placeholder="business@example.com">
                    </div>
                    <div class="form-group">
                        <label for="businessPhoneNum">Phone:</label>
                        <input type="tel" id="businessPhoneNum" placeholder="+61 2 XXXX XXXX">
                    </div>
                    <div class="form-group">
                        <label for="businessAddr">Address:</label>
                        <textarea id="businessAddr" placeholder="123 Street, City, Country" rows="3"></textarea>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-save">Save Changes</button>
                        <button type="button" class="btn-cancel" onclick="resetBusinessForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Security Tab -->
            <div id="security" class="account-tab-content">
                <h3>Security Settings</h3>
                <div id="securitySuccess" class="success-message"></div>
                <div id="securityError" class="error-message"></div>
                
                <form id="securityForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="currentPassword">Current Password:</label>
                            <input type="password" id="currentPassword" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="newPassword">New Password:</label>
                            <input type="password" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password:</label>
                            <input type="password" id="confirmPassword" required minlength="6">
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-save">Update Password</button>
                        <button type="button" class="btn-cancel" onclick="resetSecurityForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/theme-manager.js"></script>
    <script src="../assets/js/components-loader.js"></script>
    <script src="../assets/js/invoice-manager.js"></script>
    <script src="../assets/js/form-handler.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/carousel.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script>
        // Load user data on page load
        function loadAccountData() {
            const user = AuthManager.getCurrentUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Update header
            document.getElementById('accountAvatar').textContent = (user.businessName || user.email).substring(0, 1).toUpperCase();
            document.getElementById('accountBusinessName').textContent = user.businessName || 'My Business';
            document.getElementById('accountEmail').textContent = user.email;
            const joinDate = new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            document.getElementById('accountMemberSince').textContent = `Member since: ${joinDate}`;
            
            // Load profile form
            document.getElementById('profileEmail').value = user.email || '';
            document.getElementById('profilePhone').value = user.phone || '';
            
            // Load business form
            document.getElementById('businessName').value = user.businessName || '';
            document.getElementById('businessABN').value = user.businessABN || '';
            document.getElementById('businessAddr').value = user.businessAddress || '';
            document.getElementById('businessBusinessEmail').value = user.businessEmail || '';
            document.getElementById('businessPhoneNum').value = user.businessPhone || '';
        }
        
        // Tab switching
        document.querySelectorAll('.account-tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                
                document.querySelectorAll('.account-tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelectorAll('.account-tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                document.getElementById(tabName).classList.add('active');
                this.classList.add('active');
            });
        });
        
        // Profile Form Handler
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('profileEmail').value;
            const phone = document.getElementById('profilePhone').value;
            const successMsg = document.getElementById('profileSuccess');
            const errorMsg = document.getElementById('profileError');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            const user = AuthManager.getCurrentUser();
            user.email = email;
            user.phone = phone;
            
            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.id === user.id);
                
                if (userIndex !== -1) {
                    users[userIndex] = user;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    successMsg.textContent = 'Profile updated successfully!';
                    successMsg.style.display = 'block';
                } else {
                    throw new Error('User not found');
                }
            } catch (error) {
                errorMsg.textContent = 'Error updating profile: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
        
        // Business Form Handler
        document.getElementById('businessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const businessName = document.getElementById('businessName').value;
            const businessABN = document.getElementById('businessABN').value;
            const businessAddr = document.getElementById('businessAddr').value;
            const businessEmail = document.getElementById('businessBusinessEmail').value;
            const businessPhone = document.getElementById('businessPhoneNum').value;
            const successMsg = document.getElementById('businessSuccess');
            const errorMsg = document.getElementById('businessError');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            const user = AuthManager.getCurrentUser();
            user.businessName = businessName;
            user.businessABN = businessABN;
            user.businessAddress = businessAddr;
            user.businessEmail = businessEmail;
            user.businessPhone = businessPhone;
            
            console.log('💾 Saving business info:', user);
            
            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.id === user.id);
                
                if (userIndex !== -1) {
                    users[userIndex] = user;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    console.log('✅ Business info saved successfully');
                    successMsg.textContent = 'Business information updated successfully!';
                    successMsg.style.display = 'block';
                    
                    // Update header
                    document.getElementById('accountBusinessName').textContent = businessName;
                } else {
                    throw new Error('User not found');
                }
            } catch (error) {
                errorMsg.textContent = 'Error updating business info: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
        
        // Security Form Handler
        document.getElementById('securityForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const successMsg = document.getElementById('securitySuccess');
            const errorMsg = document.getElementById('securityError');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            // Validate new passwords match
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'New passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }
            
            const user = AuthManager.getCurrentUser();
            
            // Verify current password
            if (user.password !== btoa(currentPassword)) {
                errorMsg.textContent = 'Current password is incorrect!';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.id === user.id);
                
                if (userIndex !== -1) {
                    user.password = btoa(newPassword);
                    users[userIndex] = user;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    successMsg.textContent = 'Password updated successfully!';
                    successMsg.style.display = 'block';
                    
                    // Reset form
                    setTimeout(() => {
                        document.getElementById('securityForm').reset();
                    }, 1500);
                } else {
                    throw new Error('User not found');
                }
            } catch (error) {
                errorMsg.textContent = 'Error updating password: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
        
        // Reset form functions
        function resetProfileForm() {
            loadAccountData();
        }
        
        function resetBusinessForm() {
            loadAccountData();
        }
        
        function resetSecurityForm() {
            document.getElementById('securityForm').reset();
        }
        
        // Logout handler
        window.handleLogout = function() {
            if (confirm('Are you sure you want to logout?')) {
                AuthManager.logout();
                window.location.href = 'index.html';
            }
        };
        
        // Load data on page load
        loadAccountData();
    </script>
</body>
</html>
