<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Yuno</title>
    <link rel="icon" href="../assets/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/core.css">
    <link rel="stylesheet" href="../assets/css/typography.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/hero.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/buttons.css">
    <link rel="stylesheet" href="../assets/css/form-styles.css">
    <link rel="stylesheet" href="../assets/css/table-styles.css">
    <link rel="stylesheet" href="../assets/css/modal.css">
    <link rel="stylesheet" href="../assets/css/banner.css">
    <link rel="stylesheet" href="../assets/css/totals.css">
    <link rel="stylesheet" href="../assets/css/sections.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="topNav">
        <div id="navBrand" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <img src="../assets/images/logo.svg" alt="Yuno Logo" style="width: 40px; height: 40px; display: flex;" />
            <h1 style="margin: 0; background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; font-size: 1.5rem; letter-spacing: 1px;">YUNO</h1>
        </div>
        <div id="navMenu"></div>
        <button id="themeToggle" title="Toggle Dark Mode" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: 0.5rem; border-radius: 50%; hover-background: rgba(0,0,0,0.1); transition: all 0.3s ease;">
            <span class="theme-icon">🌙</span>
        </button>
    </nav>

    <main>
        <div class="container">
            <!-- Quick Actions -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                <a href="invoice.html" class="btn-primary" style="padding: 1rem; text-align: center; text-decoration: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <span style="font-size: 1.5rem;">📄</span> Create Invoice
                </a>
                <a href="clients.html" class="btn-secondary" style="padding: 1rem; text-align: center; text-decoration: none; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <span style="font-size: 1.5rem;">👥</span> Manage Clients
                </a>
            </div>

            <div class="dashboard-header">
                <h2>Your Invoices</h2>
                <div class="dashboard-controls">
                    <input type="text" id="filterInput" class="search-box" placeholder="Search invoices...">
                    <button id="deleteAllBtn" class="btn-danger">Delete All</button>
                </div>
            </div>

            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-label">Total Invoices</div>
                    <div class="stat-value" id="totalInvoices">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Amount</div>
                    <div class="stat-value" id="totalAmount">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="pendingCount">0</div>
                </div>
            </div>

            <div class="dashboard-table-wrapper">
                <table id="invoicesTable" class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Client Name</th>
                            <th>Invoice Date</th>
                            <th>Due Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" class="text-center">No invoices found. <a href="demo.html">Create one</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Invoice Preview Modal -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="invoicePreview" class="invoice-preview"></div>
            <div class="button-group">
                <button id="downloadPdfBtn" class="btn-secondary">Download PDF</button>
                <button id="printBtn" class="btn-secondary">Print</button>
                <button class="close-modal btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <footer></footer>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/theme-manager.js"></script>
    <script src="../assets/js/components-loader.js"></script>
    <script src="../assets/js/invoice-manager.js"></script>
    <script src="../assets/js/form-handler.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/carousel.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script>
        // Update dashboard statistics
        function updateStats() {
            try {
                const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
                document.getElementById('totalInvoices').textContent = invoices.length;
                
                let totalAmount = 0;
                invoices.forEach(inv => {
                    totalAmount += inv.total;
                });
                document.getElementById('totalAmount').textContent = '$' + totalAmount.toFixed(2);
                document.getElementById('pendingCount').textContent = invoices.length;
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        // Close modal when clicking close button
        document.querySelectorAll('.close, .close-modal').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('previewModal').classList.add('hidden');
            });
        });

        // Initialize dashboard
        updateStats();
    </script>
</body>
</html>
