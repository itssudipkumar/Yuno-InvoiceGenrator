<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="max-width: 100%; height: auto;">
  <defs>
    <linearGradient id="geometricGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#db2777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#geometricGradient)" stroke-width="2"/>
  
  <polygon points="100,45 150,72.5 150,127.5 100,155 50,127.5 50,72.5" fill="url(#geometricGradient)" opacity="0.05" stroke="url(#geometricGradient)" stroke-width="1"/>
  
  <path d="M 75 65 L 95 90 L 95 100 L 75 100 Z" fill="url(#geometricGradient)" filter="url(#glow)"/>
  <path d="M 70 70 L 90 95 L 90 105 L 70 105 Z" fill="url(#geometricGradient)" opacity="0.3"/>
  
  <path d="M 125 65 L 105 90 L 105 100 L 125 100 Z" fill="url(#accentGradient)" filter="url(#glow)"/>
  <path d="M 130 70 L 110 95 L 110 105 L 130 105 Z" fill="url(#accentGradient)" opacity="0.3"/>
  
  <rect x="92" y="95" width="16" height="75" rx="8" fill="url(#geometricGradient)" filter="url(#glow)"/>
  <rect x="95" y="98" width="10" height="70" rx="5" fill="url(#accentGradient)" opacity="0.4"/>
  
  <circle cx="100" cy="95" r="13" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="9" fill="url(#geometricGradient)" opacity="0.5"/>
  <circle cx="100" cy="95" r="5" fill="white"/>
  
  <circle cx="100" cy="175" r="11" fill="url(#geometricGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="175" r="7" fill="url(#accentGradient)" opacity="0.6"/>
  
  <line x1="80" y1="100" x2="95" y2="100" stroke="url(#geometricGradient)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="105" y1="100" x2="120" y2="100" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  
  <circle cx="55" cy="55" r="3.5" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="145" cy="145" r="3.5" fill="url(#geometricGradient)" opacity="0.6"/>
</svg>